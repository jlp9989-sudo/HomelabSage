<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}HomelabSage{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.45 system-ui, sans-serif; background:#0f1419; color:#d9e1e8; margin:0; }
  header { padding:1rem 1.5rem; background:#161c24; border-bottom:1px solid #2a3340; display:flex; gap:1rem; align-items:center; }
  header h1 { margin:0; font-size:1.1rem; }
  nav a { color:#8fa3b8; text-decoration:none; padding:.35rem .75rem; border-radius:4px; }
  nav a:hover, nav a.active { color:#d9e1e8; background:#1c2530; }
  .spacer { margin-left:auto; }
  button, .btn { background:#1e90ff; border:0; color:#fff; padding:.45rem .9rem; border-radius:4px; cursor:pointer; font-size:.85rem; text-decoration:none; display:inline-block; }
  button.ghost, .btn.ghost { background:transparent; border:1px solid #2a3340; color:#d9e1e8; }
  button.danger, .btn.danger { background:#c0392b; }
  main { padding:1rem 1.5rem; }
  .pill { padding:.3rem .7rem; background:#1c2530; border-radius:999px; font-size:.8rem; }
  table { width:100%; border-collapse:collapse; background:#161c24; border-radius:6px; overflow:hidden; }
  th, td { padding:.55rem .8rem; text-align:left; border-bottom:1px solid #2a3340; vertical-align:top; }
  th { background:#1c2530; font-size:.75rem; text-transform:uppercase; letter-spacing:.04em; color:#8fa3b8; }
  tr:last-child td { border-bottom:0; }
  .sev { display:inline-block; padding:.15rem .55rem; border-radius:3px; font-size:.75rem; font-weight:600; }
  .sev-critical { background:#7b1f1f; color:#fff; }
  .sev-high     { background:#a44a18; color:#fff; }
  .sev-medium   { background:#a48618; color:#000; }
  .sev-info     { background:#205b8a; color:#fff; }
  .muted { color:#8fa3b8; }
  .actions form { display:inline; }
  code { background:#0a0d11; padding:0 .25rem; border-radius:3px; }
  input[type=text], input[type=password], input[type=number], textarea, select { background:#0a0d11; color:#d9e1e8; border:1px solid #2a3340; padding:.5rem; border-radius:4px; font: 13px/1.45 ui-monospace, monospace; width:100%; box-sizing:border-box; }
  textarea { resize:vertical; }
  textarea.notes-editor { min-height:60vh; }
  textarea.field-input { min-height:6rem; }
  .row { display:flex; gap:.5rem; margin-bottom:.5rem; align-items:center; }
  .row > label { min-width:6rem; color:#8fa3b8; }
  /* settings UI */
  .blocks-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(15rem, 1fr)); gap:.75rem; }
  .block-card { background:#161c24; border:1px solid #2a3340; border-radius:6px; padding:1rem; text-decoration:none; color:inherit; }
  .block-card:hover { border-color:#3b5168; }
  .block-card h3 { margin:0 0 .25rem 0; font-size:.95rem; }
  .block-card .desc { color:#8fa3b8; font-size:.78rem; font-family:ui-monospace, monospace; }
  .override-badge { display:inline-block; background:#5a4218; color:#ffc77a; padding:.1rem .5rem; border-radius:999px; font-size:.7rem; margin-top:.5rem; }
  .field { background:#161c24; border:1px solid #2a3340; border-radius:6px; padding:.85rem 1rem; margin-bottom:.6rem; }
  .field.is-override { border-left:3px solid #ffc77a; }
  .field-head { display:flex; gap:.5rem; align-items:baseline; margin-bottom:.4rem; }
  .field-head label { font-weight:600; }
  .field-head .field-type { color:#8fa3b8; font-size:.72rem; font-family:ui-monospace, monospace; }
  .field-head .override-tag { color:#ffc77a; font-size:.7rem; }
  .field-help { color:#8fa3b8; font-size:.78rem; margin-bottom:.4rem; }
  .field-actions { display:flex; gap:.4rem; align-items:center; margin-top:.4rem; }
  .field-actions form { display:inline; }
  .flash { padding:.5rem .9rem; border-radius:4px; margin-bottom:.8rem; }
  .flash.success { background:#1c4a26; color:#b6f5c1; }
  .flash.error   { background:#5a1f1f; color:#f5b6b6; }
  .form-toolbar { display:flex; gap:.5rem; margin:1rem 0; }
</style>
<script src="/static/htmx.min.js" defer></script>
</head>
<body>
<header>
  <h1>HomelabSage</h1>
  <nav>
    <a href="/" class="{% if nav == 'updates' %}active{% endif %}">Updates</a>
    <a href="/notes" class="{% if nav == 'notes' %}active{% endif %}">Notes</a>
    <a href="/settings" class="{% if nav == 'settings' %}active{% endif %}">Settings</a>
  </nav>
  <div class="spacer"></div>
  {% block header_actions %}{% endblock %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
